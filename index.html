<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryzo's Coffee Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

    <nav id="navbar">
        <div id="navbar-inner">
            <img src="logo.png" alt="Logo" id="nav-logo">
            <p id="nav-title">Bo's Coffee</p>
            <button id="order-btn">🛒 View Order</button>
        </div>
    </nav>

    <video id="banner" src="banner.mp4" autoplay loop muted playsinline></video>

    <section id="menu-section">
        <div id="menu-tabs">
            <button class="menu-tab active" data-category="espresso">Espresso</button>
            <button class="menu-tab" data-category="signature">Signature & Brewed</button>
            <button class="menu-tab" data-category="froccino">Froccino</button>
            <button class="menu-tab" data-category="freeze">Freeze</button>
            <button class="menu-tab" data-category="tea">Tea</button>
            <button class="menu-tab" data-category="chocolate">Chocolate</button>
            <button class="menu-tab" data-category="nondairy">Non-Dairy</button>
            <button class="menu-tab" data-category="rtd">Ready to Drink</button>
            <button class="menu-tab" data-category="food">Food</button>
            <button class="menu-tab" data-category="pastries">Pastries</button>
            <button class="menu-tab" data-category="cakes">Cakes</button>
            <button class="menu-tab" data-category="beans">Coffee Beans</button>
            <button class="menu-tab" data-category="merchandise">Merch & Bags</button>
        </div>
        <div id="container"></div>
    </section>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">Your Order</h4>
                <button id="clear-all-btn">Clear All</button>
            </div>
            <div class="modal-body" id="cart-body"></div>
            <div class="modal-footer">
                <p id="orderNo"></p>
                <div class="footer-actions">
                    <span id="cartTotal">Total: ₱0</span>
                    <button id="placeOrderBtn">Place Order</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="site-footer">
        <p>© 2026 Bo's Coffee. All rights reserved.</p>
    </footer>

    <script src="index.js"></script>

</body>

</html>
